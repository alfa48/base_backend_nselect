services:
  db:
    image: postgres:15-alpine
    container_name: mock-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Admin@123
      - POSTGRES_DB=libera_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d libera_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./mock-api
    container_name: mock-api
    ports:
      - "8080:8080"
    environment:
      - DB_USER=postgres
      - DB_HOST=db
      - DB_NAME=libera_db
      - DB_PASSWORD=Admin@123
    volumes:
      - ./mock-api:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
