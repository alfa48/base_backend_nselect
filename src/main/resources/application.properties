spring.application.name=dpd
spring.thymeleaf.cache=false
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

server.port=8091

# Configurações de Sessão
server.servlet.session.timeout=30m

                        ## DevTools ##
# Ativa o reinício automático da aplicação ao detectar mudanças no código Java
spring.devtools.restart.enabled=true
# Ativa o recarregamento automático do browser após mudanças nos templates
spring.devtools.livereload.enabled=true
# Monitoriza caminhos adicionais para detecção de alterações
spring.devtools.restart.additional-paths=src/main/java,src/main/resources

# Controle de Logs (INFO = Ligado, OFF = Desligado completo)
logging.level.co.ao.base=INFO

                        ## API CONFIG ##
api.key=${API_KEY:a0b136527367da54a4b8}
api.base-url=${API_BASE_URL:https://libera.ss-cloud.co/api/v1}
