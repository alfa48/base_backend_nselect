<!DOCTYPE html><!--  Last Published: Sat Apr 25 2026 22:30:53 GMT+0000 (Coordinated Universal Time)  -->
<html xmlns:th="http://www.thymeleaf.org" data-wf-page="69ece6767da02af7512b39c1" data-wf-site="69ece585cad09a74baae0d40">
<head th:replace="~{layout/fragments/head :: head('Dashboard - Admin')}"></head>
<body>
  <div th:replace="~{layout/fragments/admin-nav :: nav}"></div>
  <section class="section-3 main">
    <div class="contain-this">
      <div>
        <div class="w-layout-grid grid-49">
          <div class="div-block-453">
            <div class="text-block-253">Total de parceiros</div>
            <div class="text-block-254" th:text="${overview != null ? overview.totalParceiros : '0'}">0</div>
            <div>
              <div class="kpi-bottom-section">
                <div class="kpi-stats-wrapper" th:if="${overview != null}">
                  <div class="kpi-stats" th:classappend="${(overview.totalParceirosTrend != null ? overview.totalParceirosTrend : 0.0) >= 0 ? 'positive' : 'negative'}">
                    <div class="icon kpi-stats-icon">
                      <div class="main-font-icon smaller-icon" th:text="${(overview.totalParceirosTrend != null ? overview.totalParceirosTrend : 0.0) >= 0 ? '8' : 'trending_down'}">8</div>
                    </div>
                    <div class="stats" th:text="${#numbers.formatDecimal(overview.totalParceirosTrend != null ? overview.totalParceirosTrend : 0.0, 1, 2) + '%'}">8.26%</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="div-block-453">
            <div class="text-block-253">Total de leads</div>
            <div class="text-block-254" th:text="${overview != null ? overview.totalLeads : '0'}">0</div>
            <div>
              <div class="kpi-bottom-section">
                <div class="kpi-stats-wrapper" th:if="${overview != null}">
                  <div class="kpi-stats" th:classappend="${(overview.totalLeadsTrend != null ? overview.totalLeadsTrend : 0.0) >= 0 ? 'positive' : 'negative'}">
                    <div class="icon kpi-stats-icon">
                      <div class="main-font-icon smaller-icon" th:classappend="${(overview.totalLeadsTrend != null ? overview.totalLeadsTrend : 0.0) < 0 ? 'down' : ''}" th:text="${(overview.totalLeadsTrend != null ? overview.totalLeadsTrend : 0.0) >= 0 ? 'trending_up' : '8'}">8</div>
                    </div>
                    <div class="stats" th:text="${#numbers.formatDecimal(overview.totalLeadsTrend != null ? overview.totalLeadsTrend : 0.0, 1, 2) + '%'}">8.26%</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="div-block-453">
            <div class="text-block-253">Tickets Abertos</div>
            <div class="text-block-254" th:text="${overview != null ? overview.ticketsAbertos : '0'}">0</div>
            <div>
              <div class="kpi-bottom-section">
                <div class="kpi-stats-wrapper" th:if="${overview != null}">
                  <div class="kpi-stats" th:classappend="${(overview.ticketsAbertosTrend != null ? overview.ticketsAbertosTrend : 0.0) >= 0 ? 'negative' : 'positive'}">
                    <div class="icon kpi-stats-icon">
                      <div class="main-font-icon smaller-icon" th:text="${(overview.ticketsAbertosTrend != null ? overview.ticketsAbertosTrend : 0.0) >= 0 ? 'trending_up' : '8'}">8</div>
                    </div>
                    <div class="stats" th:text="${#numbers.formatDecimal(overview.ticketsAbertosTrend != null ? overview.ticketsAbertosTrend : 0.0, 1, 2) + '%'}">8.26%</div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="div-block-454">
        <div data-current="Tab 1" data-easing="ease" data-duration-in="300" data-duration-out="100" class="w-tabs">
          <div class="tabs-menu w-tab-menu">
            <a data-w-tab="Tab 1" class="table-tab-link w-inline-block w-tab-link w--current">
              <div>Últimos tickets</div>
            </a>
            <a data-w-tab="Tab 3" class="table-tab-link w-inline-block w-tab-link">
              <div>Últimos parceiros</div>
            </a>
          </div>
          <div class="w-tab-content">
            <div data-w-tab="Tab 1" class="w-tab-pane w--tab-active">
              <div>
                <!-- Iterar Últimos Tickets -->
                <th:block th:each="ticket : ${recentTickets}">
                  <div class="main-card">
                    <a th:href="@{/admin/tickets/{id}(id=${ticket.publicId})}" class="main-items-of-card w-inline-block">
                      <div class="icon-div">
                        <div class="text-block-255">2</div>
                      </div>
                      <div class="content-do-card-div">
                        <div class="text-block-256 main" th:text="${ticket.conteudo}">Parte do conteudo do ticket</div>
                      </div>
                      <div class="content-do-card-div">
                        <div class="text-block-256" th:text="${ticket.tipo}">TIPO</div>
                      </div>
                      <div class="content-do-card-div status-things">
                        <div class="status-wrapper" th:classappend="${ticket.estado != null ? #strings.toLowerCase(ticket.estado) : ''}">
                          <div class="status-text" th:text="${ticket.estado}">ABERTO</div>
                        </div>
                      </div>
                    </a>
                    <div class="options-side">
                      <a th:href="@{/admin/tickets/{id}(id=${ticket.publicId})}" class="link-4">8</a>
                    </div>
                  </div>
                </th:block>
                <div th:if="${#lists.isEmpty(recentTickets)}" class="text-block-256" style="text-align: center; padding: 20px; opacity: 0.6;">
                  Nenhum ticket recente.
                </div>
              </div>
            </div>
            <div data-w-tab="Tab 3" class="w-tab-pane">
              <div>
                <!-- Iterar Últimos Parceiros -->
                <th:block th:each="parceiro : ${recentParceiros}">
                  <div class="main-card">
                    <a th:href="@{/admin/parceiros/ver/{id}(id=${parceiro.publicId})}" class="main-items-of-card w-inline-block">
                      <div class="icon-div">
                        <div class="text-block-255">j</div>
                      </div>
                      <div class="content-do-card-div">
                        <div class="text-block-256 main" th:text="${parceiro.nome}">Nome do parceiro</div>
                      </div>
                      <div class="content-do-card-div">
                        <div class="text-block-256" th:text="${parceiro.provinciaNome}">Província</div>
                      </div>
                      <div class="content-do-card-div status-things">
                        <div class="status-wrapper" th:classappend="${parceiro.tipoParceiroNome == 'PARCEIRO' ? 'factura' : (parceiro.tipoParceiroNome == 'AGENTE' ? 'nao-pago' : 'pago')}">
                          <div class="status-text" th:text="${parceiro.tipoParceiroNome}">AGENTE</div>
                        </div>
                      </div>
                    </a>
                    <div class="options-side">
                      <a th:href="@{/admin/parceiros/ver/{id}(id=${parceiro.publicId})}" class="link-4">8</a>
                      <a th:href="@{/admin/parceiros/editar/{id}(id=${parceiro.publicId})}" class="link-4">u</a>
                    </div>
                  </div>
                </th:block>
                <div th:if="${#lists.isEmpty(recentParceiros)}" class="text-block-256" style="text-align: center; padding: 20px; opacity: 0.6;">
                  Nenhum parceiro recente.
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <th:block th:replace="~{layout/fragments/scripts :: scripts}"></th:block>
</body>
</html>
