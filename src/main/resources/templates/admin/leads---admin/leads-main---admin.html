<!DOCTYPE html><!--  Last Published: Sat Apr 25 2026 22:30:53 GMT+0000 (Coordinated Universal Time)  -->
<html data-wf-page="69ed00598e555cf1c7a74a5b" data-wf-site="69ece585cad09a74baae0d40" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments/head :: head('Leads main - Admin')}"></head>
<body>
  <div th:replace="~{layout/fragments/admin-nav :: nav}"></div>
  <section class="section-3 parceiros">
    <div class="horizontal-navigation">
      <div class="contain-this">
        <div class="div-block-455">
          <div class="div-block-456">
            <a href="javascript:history.back()" class="link-5">q</a>
            <div class="text-block-258">Leads</div>
          </div>
          <div class="div-block-457">
            <div class="form-block-2 w-form">
              <form id="email-form" name="email-form" th:action="@{/admin/leads}" method="get" class="form-3">
                <select id="ano" name="ano" class="select-field-2 w-select" onchange="this.form.submit()">
                  <option value="">Ano</option>
                  <option th:each="y : ${#numbers.sequence(#temporals.year(#temporals.createNow()), 2024)}" 
                          th:value="${y}" th:text="${y}" th:selected="${y == anoSel}"></option>
                </select>
                <select id="mes" name="mes" class="select-field-2 w-select" onchange="this.form.submit()">
                  <option value="">Mês</option>
                  <option th:each="m : ${meses}" 
                          th:value="${m.id}" 
                          th:text="${m.nome}"
                          th:selected="${m.id == mesSel}"></option>
                </select>
                <select id="estado" name="estado" class="select-field-2 w-select" onchange="this.form.submit()">
                  <option value="">Fase</option>
                  <option value="LEAD" th:selected="${estadoSel == 'LEAD'}">Leads</option>
                  <option value="PENDENTE" th:selected="${estadoSel == 'PENDENTE'}">Pendente</option>
                  <option value="CONVERTIDO" th:selected="${estadoSel == 'CONVERTIDO'}">Convertido</option>
                  <option value="PERDIDO" th:selected="${estadoSel == 'PERDIDO'}">Perdido</option>
                </select>
                <select id="parceiro" name="parceiro" class="select-field-2 w-select" onchange="this.form.submit()">
                  <option value="">Parceiro</option>
                  <option th:each="p : ${parceiros}" 
                          th:value="${p.publicId}" 
                          th:text="${p.nome}"
                          th:selected="${p.publicId == parceiroSel}"></option>
                </select>
              </form>
              <div class="w-form-done">
                <div>Thank you! Your submission has been received!</div>
              </div>
              <div class="w-form-fail">
                <div>Oops! Something went wrong while submitting the form.</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="contain-this">
      <div class="div-block-500">
        <!-- Coluna: LEADS -->
        <div class="phase-content-wp">
          <div th:replace="~{layout/fragments/leads :: column-header('LEADS', ${leadsLead})}"></div>
          <th:block th:if="${leadsLead != null}" th:each="lead : ${leadsLead.content}">
            <div th:replace="~{layout/fragments/leads :: lead-card(${lead}, '', @{/admin/leads/{id}(id=${lead.publicId})})}"></div>
          </th:block>
          <div th:replace="~{layout/fragments/leads :: ver-mais(${leadsLead}, @{/admin/leads(estado='LEAD', mes=${mesSel}, ano=${anoSel}, parceiro=${parceiroSel}, tamanho=${tamanhoSel + 10})})}"></div>
        </div>

        <!-- Coluna: PENDENTE -->
        <div class="phase-content-wp">
          <div th:replace="~{layout/fragments/leads :: column-header('PENDENTE', ${leadsPendente})}"></div>
          <th:block th:if="${leadsPendente != null}" th:each="lead : ${leadsPendente.content}">
            <div th:replace="~{layout/fragments/leads :: lead-card(${lead}, 'col-2', @{/admin/leads/{id}(id=${lead.publicId})})}"></div>
          </th:block>
          <div th:replace="~{layout/fragments/leads :: ver-mais(${leadsPendente}, @{/admin/leads(estado='PENDENTE', mes=${mesSel}, ano=${anoSel}, parceiro=${parceiroSel}, tamanho=${tamanhoSel + 10})})}"></div>
        </div>

        <!-- Coluna: CONVERTIDO -->
        <div class="phase-content-wp">
          <div th:replace="~{layout/fragments/leads :: column-header('CONVERTIDO', ${leadsConvertido})}"></div>
          <th:block th:if="${leadsConvertido != null}" th:each="lead : ${leadsConvertido.content}">
            <div th:replace="~{layout/fragments/leads :: lead-card(${lead}, 'won', @{/admin/leads/{id}(id=${lead.publicId})})}"></div>
          </th:block>
          <div th:replace="~{layout/fragments/leads :: ver-mais(${leadsConvertido}, @{/admin/leads(estado='CONVERTIDO', mes=${mesSel}, ano=${anoSel}, parceiro=${parceiroSel}, tamanho=${tamanhoSel + 10})})}"></div>
        </div>

        <!-- Coluna: PERDIDO -->
        <div class="phase-content-wp">
          <div th:replace="~{layout/fragments/leads :: column-header('PERDIDO', ${leadsPerdido})}"></div>
          <th:block th:if="${leadsPerdido != null}" th:each="lead : ${leadsPerdido.content}">
            <div th:replace="~{layout/fragments/leads :: lead-card(${lead}, 'lost', @{/admin/leads/{id}(id=${lead.publicId})})}"></div>
          </th:block>
          <div th:replace="~{layout/fragments/leads :: ver-mais(${leadsPerdido}, @{/admin/leads(estado='PERDIDO', mes=${mesSel}, ano=${anoSel}, parceiro=${parceiroSel}, tamanho=${tamanhoSel + 10})})}"></div>
        </div>
      </div>
    </div>
      </div>
    </div>
  </section>
  <th:block th:replace="~{layout/fragments/scripts :: scripts}"></th:block>
</body>
</html>
