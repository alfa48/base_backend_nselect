<!DOCTYPE html><!--  Last Published: Sat Apr 25 2026 22:30:53 GMT+0000 (Coordinated Universal Time)  -->
<html data-wf-page="69ecf4a28ef848e5ec35f61a" data-wf-site="69ece585cad09a74baae0d40"
  xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layout/fragments/head :: head('Parceiros main - Admin')}"></head>

<body>
  <div th:replace="~{layout/fragments/admin-nav :: nav}"></div>
  <section class="section-3 parceiros">
    <div class="horizontal-navigation">
      <div class="contain-this">
        <div class="div-block-455">
          <div class="div-block-456">
            <a href="javascript:history.back()" class="link-5">q</a>
            <div class="text-block-258">Parceiros</div>
            <form action="/admin/parceiros" method="get" class="search w-form">
              <input class="search-input w-input" maxlength="256" name="nome" placeholder="Pesquisar por nome"
                type="search" id="search">
              <input type="submit" class="search-button w-button" value="x">
            </form>
          </div>
          <div class="div-block-457">
            <div class="form-block-2 w-form">
              <form action="/admin/parceiros" method="get" class="form-3">
                <select name="provincia" class="select-field-2 w-select" onchange="this.form.submit()">
                  <option value="">Todas as províncias</option>
                  <option th:each="prov : ${provincias}" th:value="${prov.publicId}"
                    th:selected="${param.provincia == prov.publicId}" th:text="${prov.nome}">Luanda</option>
                </select>
                <select name="tipo" class="select-field-2 w-select" onchange="this.form.submit()">
                  <option value="">Tipo</option>
                  <option th:each="tipo : ${tipos}" th:value="${tipo.publicId}"
                    th:selected="${param.tipo == tipo.publicId}" th:text="${tipo.nome}"></option>
                </select>
              </form>
              <div class="w-form-done">
                <div>Thank you! Your submission has been received!</div>
              </div>
              <div class="w-form-fail">
                <div>Oops! Something went wrong while submitting the form.</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="contain-this">
      <div class="_8">
        <!-- Iterar Parceiros -->
        <th:block th:each="parceiro : ${parceiros.content}">
          <div class="main-card">
            <a th:href="@{/admin/parceiros/ver/{id}(id=${parceiro.publicId})}"
              class="main-items-of-card w-inline-block">
              <div class="icon-div">
                <div class="text-block-255">j</div>
              </div>
              <div class="content-do-card-div">
                <div class="text-block-256 main" th:text="${parceiro.nome}">Nome do parceiro</div>
              </div>
              <div class="content-do-card-div">
                <div class="text-block-256" th:text="${parceiro.provinciaNome}">Província</div>
              </div>
              <div class="content-do-card-div status-things">
                <div class="status-wrapper"
                  th:classappend="${parceiro.tipoParceiroNome == 'AGENTE' ? 'nao-pago' : (parceiro.tipoParceiroNome == 'PARCEIRO' ? 'factura' : 'pago')}">
                  <div class="status-text" th:text="${parceiro.tipoParceiroNome}">AGENTE</div>
                </div>
              </div>
            </a>
            <div class="options-side">
              <a th:href="@{/admin/parceiros/ver/{id}(id=${parceiro.publicId})}" class="link-4" title="Ver">8</a>
              <a th:href="@{/admin/parceiros/editar/{id}(id=${parceiro.publicId})}" class="link-4" title="Editar">u</a>
              <a href="#" class="link-4 btn-delete-parceiro" th:data-id="${parceiro.publicId}" title="Eliminar">v</a>
            </div>
          </div>
        </th:block>

        <div th:if="${#lists.isEmpty(parceiros.content)}" class="text-block-256"
          style="text-align: center; padding: 40px; opacity: 0.6;">
          Nenhum parceiro encontrado.
        </div>
      </div>
    </div>
  </section>
  <th:block th:replace="~{layout/fragments/scripts :: scripts}"></th:block>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      document.querySelectorAll('.btn-delete-parceiro').forEach(btn => {
        btn.addEventListener('click', function () {
          const id = this.getAttribute('data-id');
          Modal.deleteItem(id, `/api/admin/parceiros/${id}`, 'este parceiro');
        });
      });
    });
  </script>
</body>

</html>
