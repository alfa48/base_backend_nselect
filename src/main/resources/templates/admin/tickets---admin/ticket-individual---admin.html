<!DOCTYPE html><!--  Last Published: Sat Apr 25 2026 22:30:53 GMT+0000 (Coordinated Universal Time)  -->
<html data-wf-page="69ed0d7d7da02af7512eb52a" data-wf-site="69ece585cad09a74baae0d40" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments/head :: head('Ticket individual - Admin')}"></head>
<body>
  <div th:replace="~{layout/fragments/admin-nav :: nav}"></div>
  <section class="section-3 no-shad">
    <div class="horizontal-navigation">
      <div class="contain-this">
        <div class="div-block-455">
          <div class="div-block-456">
            <a th:href="@{/admin/tickets}" class="link-5">q</a>
            <div class="text-block-258" th:text="'Ticket #' + ${#strings.substring(ticket.publicId, 0, 8)}">Ticket #5546</div>
          </div>
        </div>
      </div>
    </div>
    <div class="contain-this">
      <div class="div-block-6 _5">
        <div class="w-layout-grid grid-3">
          <div id="w-node-_40601bc3-2220-c362-209c-44ddfe5d07e5-512eb52a">
            <p class="paragraph" th:text="${ticket.conteudo}">Conteúdo do ticket.</p>
          </div>
          <div id="w-node-_40601bc3-2220-c362-209c-44ddfe5d07fa-512eb52a">
            <div class="list-item">
              <div class="list-item-lable">Publicado por</div>
              <div class="list-item" th:text="${ticket.publicadoPorNome}">------------</div>
            </div>
            <div class="list-item">
              <div class="list-item-lable">Tipo</div>
              <div class="list-item" th:text="${ticket.tipo}">TIPO</div>
            </div>
            <div class="list-item">
              <div class="list-item-lable">Estado Atual</div>
              <div class="list-item" th:classappend="${ticket.estado == 'RESOLVIDO' ? 'green' : 'redd'}" th:text="${ticket.estado}">ABERTO</div>
            </div>
            <div class="w-form">
              <form id="form-status-ticket">
                <input type="hidden" id="ticketId" th:value="${ticket.publicId}">
                <label for="estado" class="form-field-lable">Alterar Estado</label>
                <select id="estado" name="estado" class="select-field _9 w-select">
                  <option value="">Selecione...</option>
                  <option value="ABERTO" th:selected="${ticket.estado == 'ABERTO'}">Aberto</option>
                  <option value="EM_PROGRESSO" th:selected="${ticket.estado == 'EM_PROGRESSO'}">Em progresso</option>
                  <option value="RESOLVIDO" th:selected="${ticket.estado == 'RESOLVIDO'}">Resolvido</option>
                </select>
                <button type="submit" class="button main mobile w-button" style="width: 100%; border: none; margin-top: 10px;">Atualizar</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
  <th:block th:replace="~{layout/fragments/scripts :: scripts}"></th:block>
  <script th:inline="javascript">
    document.getElementById('form-status-ticket').addEventListener('submit', function(e) {
      e.preventDefault();
      const ticketId = document.getElementById('ticketId').value;
      const estado = document.getElementById('estado').value;
      
      if (!estado) {
        Modal.error('Por favor, selecione um estado.');
        return;
      }

      Modal.showLoading('A atualizar estado...');
      fetch(`/api/tickets/${ticketId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          estado: estado,
          tipo: /*[[${ticket.tipo}]]*/ '',
          conteudo: /*[[${ticket.conteudo}]]*/ ''
        })
      })
      .then(res => res.json())
      .then(data => {
        Modal.hideLoading();
        if (data.message) {
          Modal.toast(data.message);
          setTimeout(() => location.reload(), 1500);
        } else {
          Modal.error(data.error || 'Erro ao atualizar ticket');
        }
      })
      .catch(err => {
        Modal.hideLoading();
        Modal.error('Erro de rede');
      });
    });
  </script>
</body>
</html>
