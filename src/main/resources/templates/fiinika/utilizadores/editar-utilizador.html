<!DOCTYPE html><!--  Last Published: Tue Apr 21 2026 11:33:50 GMT+0000 (Coordinated Universal Time)  -->
<html xmlns:th="http://www.thymeleaf.org" data-wf-page="69e60b2f16d9365e83a9cc6c"
  data-wf-site="69e60b2f16d9365e83a9cc56">
<head th:replace="~{layout/fragments/dashboard_layout :: head('Editar Utilizador - Fiinika Comercial')}">
</head>
<body>
  <div class="mother-div">
    <div class="page-content-wrapper">
      <div th:replace="~{layout/fragments/dashboard_layout :: navbar}"></div>
      <div data-w-id="287978e4-e45d-6d8f-5d8e-7bd478f34aad" class="content">
        <section class="criar-page-section">
          <div class="container">
            <div class="top-section-navigation">
              <a href="javascript:history.back()" class="seta-para-tras w-inline-block">
                <div class="text-block-129">q</div>
              </a>
              <div class="titulo">
                <div class="text-block-130">Editar Utilizador<br></div>
              </div>
            </div>

            <div class="form-wrapper w-form">
              <form id="wf-form-Editar-Utilizador" th:action="@{/utilizadores/editar/{id}(id=${publicId})}" th:object="${usuarioForm}"
                method="post" enctype="multipart/form-data" class="form">
                <div class="form-section tighter">
                  <div class="criar-content-wrapper">
                    <div class="photo-upload-input-wrapper"><label for="foto-input"
                        class="form-field-lable">Imagem</label>
                      <div class="photo-upload-input-field" onclick="document.getElementById('foto-input').click()" style="cursor: pointer;">
                        <div class="icon upload-icon">
                          <div class="main-font-icon">4</div>
                        </div>
                        <div class="photo-upload-text">Clique para alterar foto</div>
                        <input type="file" id="foto-input" name="foto" style="display: none;" onchange="updateFileName(this)">
                      </div>
                      <div class="uploaded-photo-wrapper" th:style="${fotoUrl != null ? 'display: flex' : 'display: none'}">
                        <div class="uploaded-photo-content">
                          <div class="uploaded-photo-div">
                            <div class="photo-contain">
                                <img id="photo-preview" th:src="${fotoUrl != null ? fotoUrl : 'https://d3e54v103j8qbb.cloudfront.net/img/image-placeholder.svg'}" alt="">
                            </div>
                          </div>
                          <div class="uploaded-photo-info">
                            <div class="div-block-3">
                              <div class="uploaded-image-name" th:text="${usuarioForm.nome}">imagem.png</div>
                            </div>
                          </div>
                        </div>
                        <div class="_3-buttons-wrapper">
                          <a href="javascript:void(0)" class="action-button w-inline-block" onclick="document.getElementById('foto-input').click()">
                            <div class="icon quick-action">
                              <div class="main-font-icon">w</div>
                              <div class="button-text quick-action-text">Substituir</div>
                            </div>
                          </a>
                          <a href="javascript:void(0)" class="action-button w-inline-block" onclick="removePhoto()">
                            <div class="icon quick-action">
                              <div class="main-font-icon">v</div>
                              <div class="button-text quick-action-text">Eliminar</div>
                            </div>
                          </a>
                        </div>
                      </div>
                    </div>
                    <div class="form-field-wrapper"><label for="name" class="form-field-lable">Nome</label>
                      <input class="form-text-field w-input" maxlength="256" th:field="*{nome}"
                        placeholder="Nome completo" type="text" id="field" required>
                    </div>
                    <div class="form-field-wrapper"><label for="Filtro-ano-2" class="form-field-lable">Tipo de utilizador</label>
                      <div>
                        <select th:field="*{role}" class="select-field w-select" required>
                          <option value="">Selecione...</option>
                          <option value="ADMIN">Administrador</option>
                          <option value="OPERADOR">Operador</option>
                        </select>
                      </div>
                    </div>
                    <div class="form-field-wrapper"><label for="name" class="form-field-lable">Username (E-mail)</label>
                      <input class="form-text-field w-input" maxlength="256" th:field="*{username}"
                        placeholder="exemplo@dominio.com" type="email" id="field-email" required readonly>
                      <small>O username não pode ser alterado.</small>
                    </div>
                    
                    <div class="create-div">
                      <button type="submit" class="button main w-button">Salvar alterações</button>
                    </div>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>
  <div th:replace="~{layout/fragments/dashboard_layout :: scripts}"></div>
  <script>
    function updateFileName(input) {
      if (input.files && input.files[0]) {
        const file = input.files[0];
        const fileName = file.name;
        document.querySelector('.photo-upload-text').innerText = fileName;
        document.querySelector('.uploaded-image-name').innerText = fileName;
        const reader = new FileReader();
        reader.onload = function(e) {
          const previewImg = document.getElementById('photo-preview');
          previewImg.src = e.target.result;
          document.querySelector('.uploaded-photo-wrapper').style.display = 'flex';
        }
        reader.readAsDataURL(file);
      }
    }
    function removePhoto() {
        const input = document.getElementById('foto-input');
        input.value = '';
        document.querySelector('.photo-upload-text').innerText = 'Clique para fazer upload';
        document.querySelector('.uploaded-photo-wrapper').style.display = 'none';
        document.getElementById('photo-preview').src = 'https://d3e54v103j8qbb.cloudfront.net/img/image-placeholder.svg';
    }
  </script>
</body>
</html>
