<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-wf-page="69e60b2f16d9365e83a9ccf0" data-wf-site="69e60b2f16d9365e83a9cc56">

<head th:replace="~{layout/fragments/auth :: head('Inscrição - Fiinika Comercial')}">
</head>

<body>
  <div class="auth-bg">
    <div class="auth-form-wrapper w-form">

      <form id="wf-form-Signup" name="wf-form-Signup" data-name="Signup" method="post" th:action="@{/inscricao}"
        th:object="${signupForm}" class="auth-form">

        <div class="form-content">

          <div th:replace="~{layout/fragments/auth :: logoHeader}"></div>

          <div class="form-header">
            <h1 class="pages-h2">Inscrição simplificada</h1>
          </div>

          <!-- Mensagem de Erro -->
          <div th:if="${error}"
            style="background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 1rem; border-radius: 0.75rem; margin-bottom: 1.5rem; font-size: 0.875rem;">
            <span th:text="${error}"></span>
          </div>

          <div class="form-field-wrapper-2">
            <label for="Nome" class="field-lable">Nome</label>
            <input class="text-field w-input" maxlength="256" placeholder="Seu nome completo"
              type="text" id="Nome" required="" th:field="*{nome}">
          </div>

          <div class="form-field-wrapper-2">
            <label for="Email" class="field-lable">Email</label>
            <input class="text-field w-input" maxlength="256"
              placeholder="seu@email.com" type="email" id="Email" required="" th:field="*{username}">
          </div>

          <div class="form-field-wrapper-2">
            <label for="Senha" class="field-lable">Senha</label>
            <input class="text-field w-input" maxlength="256" placeholder="••••••••"
              type="password" id="Senha" required="" th:field="*{password}">
          </div>

          <button type="submit" class="submit-button" style="width: 100%; border: none; cursor: pointer;">Criar
            Conta</button>

          <div style="margin-top: 1.5rem; text-align: center; font-size: 0.875rem;">
            Já tem uma conta? <a th:href="@{/}" class="form-cta">Fazer login</a>
          </div>
        </div>
      </form>
    </div>
    <div class="auth-image-overlay"></div>
  </div>

  <div th:replace="~{layout/fragments/auth :: scripts}"></div>

</body>

</html>
