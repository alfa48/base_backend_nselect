<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content)">
<head>
    <meta charset="UTF-8">
    <title>DPD System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div style="margin-bottom: 3rem;">
                <h2 style="font-weight: 700; color: var(--primary);">DPD CORE</h2>
            </div>
            
            <nav style="flex: 1;">
                <a th:href="@{/dashboard}" class="nav-link" th:classappend="${#request.requestURI == '/dashboard' ? 'active' : ''}">
                    Dashboard
                </a>
                <a th:href="@{/usuarios}" class="nav-link" th:classappend="${#request.requestURI.startsWith('/usuarios') ? 'active' : ''}">
                    Usuários
                </a>
            </nav>

            <div style="margin-top: auto; padding-top: 2rem; border-top: 1px solid var(--border);">
                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem;">
                    <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center;">
                        <span th:text="${session.user != null ? session.user.nome.substring(0,1) : 'U'}">U</span>
                    </div>
                    <div>
                        <p style="font-weight: 600; font-size: 0.875rem;" th:text="${session.user != null ? session.user.nome : 'Usuário'}"></p>
                        <p style="color: var(--text-dim); font-size: 0.75rem;">Administrador</p>
                    </div>
                </div>
                <a th:href="@{/logout}" class="nav-link" style="color: #ef4444;">Sair</a>
            </div>
        </aside>

        <main class="main-content">
            <div th:replace="${content}"></div>
        </main>
    </div>
</body>
</html>
