<!DOCTYPE html><!--  Last Published: Sat Apr 25 2026 22:30:53 GMT+0000 (Coordinated Universal Time)  -->
<html data-wf-page="69ed2f852792d2380d5116cb" data-wf-site="69ece585cad09a74baae0d40" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments/head :: head('Editar Nota - Parceiro')}"></head>
<body>
  <div th:replace="~{layout/fragments/parceiro-nav :: nav}"></div>
  <section class="section-3 no-shad">
    <div class="horizontal-navigation">
      <div class="contain-this">
        <div class="div-block-455">
          <div class="div-block-456">
            <a th:href="@{/parceiro/leads/{id}(id=${leadId})}" class="link-5">q</a>
            <div class="text-block-258">Editar nota</div>
          </div>
        </div>
      </div>
    </div>
    <div class="contain-this">
      <div class="div-block-504">
        <div class="w-form">
          <form id="form-editar-nota">
            <input type="hidden" id="leadId" th:value="${leadId}">
            <input type="hidden" id="notaId" th:value="${notaId}">
            <div class="criar-content-wrapper">
              <div class="form-field-wrapper">
                <label class="form-field-lable">Lead</label>
                <div class="text-block-335" th:text="${lead != null ? lead.nome : 'Lead Desconhecido'}" style="font-weight: 600; font-size: 16px; margin-top: 5px;">Nome do Lead</div>
              </div>
              <div class="form-field-wrapper">
                <label for="nota" class="form-field-lable">Nota</label>
                <div class="div-block-100"></div>
                <textarea placeholder="Escreva a sua nota aqui..." maxlength="5000" id="nota" name="nota" class="form-text-field _2 _888 w-input" required style="min-height: 120px;" th:text="${notaAtual != null ? notaAtual.nota : ''}"></textarea>
              </div>
              <div class="create-this">
                <button type="submit" class="button main mobile w-button" style="border: none; width: 100%;">Atualizar Nota</button>
              </div>
            </div>
          </form>
        </div>
      </div>
      <div class="div-block-106" style="margin-top: 30px;">
        <a href="#" class="action-button cncel w-inline-block" id="btn-apagar-nota">
          <div class="icon quick-action">
            <div class="main-font-icon" style="color: #ff5b5b;">v</div>
            <div class="button-text quick-action-text" style="color: #ff5b5b;">Apagar Nota</div>
          </div>
        </a>
      </div>
    </div>
  </section>
  <th:block th:replace="~{layout/fragments/scripts :: scripts}"></th:block>

  <script th:inline="javascript">
    document.addEventListener('DOMContentLoaded', function() {
      const leadId = document.getElementById('leadId').value;
      const notaId = document.getElementById('notaId').value;

      Modal.submitJson('form-editar-nota', `/api/leads/${leadId}/notas/${notaId}`, 'PUT', `/parceiro/leads/${leadId}`);

      document.getElementById('btn-apagar-nota').addEventListener('click', function() {
        Modal.deleteItem(notaId, `/api/leads/${leadId}/notas/${notaId}`, 'esta nota', () => {
          window.location.href = `/parceiro/leads/${leadId}`;
        });
      });
    });
  </script>
</body>
</html>
