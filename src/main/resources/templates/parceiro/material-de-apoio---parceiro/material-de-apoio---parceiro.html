<!DOCTYPE html><!--  Last Published: Sat Apr 25 2026 22:30:53 GMT+0000 (Coordinated Universal Time)  -->
<html data-wf-page="69ed32e99ac78c139c81966c" data-wf-site="69ece585cad09a74baae0d40" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout/fragments/head :: head('Material de apoio - Parceiro')}"></head>
<body>
  <div th:replace="~{layout/fragments/parceiro-nav :: nav}"></div>
  <section class="section-3 no-shad _500">
    <div class="horizontal-navigation">
      <div class="contain-this">
        <div class="div-block-455">
          <div class="div-block-456">
            <a th:href="@{/parceiro/dashboard-parceiros---parceiro}" class="link-5">q</a>
            <div class="text-block-258">Material de apoio</div>
            <form action="/search" class="search w-form"><input class="search-input w-input" maxlength="256" name="query" placeholder="Pesquisar" type="search" id="search" required=""><input type="submit" class="search-button w-button" value="x"></form>
          </div>
          <div class="div-block-457">
            <div class="form-block-2 w-form">
              <form id="email-form" name="email-form" data-name="Email Form" method="get" class="form-3" data-wf-page-id="69ed32e99ac78c139c81966c" data-wf-element-id="709a0897-6eca-2ab4-da8c-b674fa6c19d8"><select id="field" name="field" data-name="Field" class="select-field-2 _2 w-select">
                  <option value="">Tipo</option>
                  <option value="First">First choice</option>
                  <option value="Second">Second choice</option>
                  <option value="Third">Third choice</option>
                </select></form>
              <div class="w-form-done">
                <div>Thank you! Your submission has been received!</div>
              </div>
              <div class="w-form-fail">
                <div>Oops! Something went wrong while submitting the form.</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="contain-this">
      <div class="_8">
        <th:block th:each="material : ${materiais.content}">
          <div class="main-card">
            <a th:href="${material.arquivoUrl}" target="_blank" class="main-items-of-card w-inline-block">
              <div class="icon-div">
                <div class="text-block-255">c</div>
              </div>
              <div class="content-do-card-div">
                <div class="text-block-256 main" th:text="${material.nome}">Nome do conteudo</div>
              </div>
              <div class="content-do-card-div">
                <div class="text-block-256" th:text="${material.tipoConteudo}">PROMOCIONAL</div>
              </div>
              <div class="content-do-card-div status-things">
                <div class="status-wrapper" th:classappend="${material.tipoConteudo == 'PROMOCIONAL' ? 'pago' : 'nao-pago'}">
                  <div class="status-text" th:text="${material.tipoConteudo}">PROMOCIONAL</div>
                </div>
              </div>
            </a>
          </div>
        </th:block>

        <div th:if="${#lists.isEmpty(materiais.content)}" class="text-block-256" style="text-align: center; padding: 40px; opacity: 0.6;">
          Nenhum material de apoio disponível de momento.
        </div>
      </div>
    </div>
  </section>
  <th:block th:replace="~{layout/fragments/scripts :: scripts}"></th:block>
</body>
</html>
