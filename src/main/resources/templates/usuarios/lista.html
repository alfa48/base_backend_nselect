<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/fragments/layout :: layout(~{::div})}">
<body>
    <div>
        <header style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1 style="font-size: 1.875rem; font-weight: 700;">Gestão de Usuários</h1>
                <p style="color: var(--text-dim);">Operações CRUD via integração API Libera</p>
            </div>
        </header>

        <div th:if="${error}" class="glass-card" style="background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: #ef4444; margin-bottom: 1.5rem; padding: 1rem;">
            <p th:text="${error}"></p>
        </div>

        <div class="glass-card" style="padding: 0; overflow: hidden;">
            <table style="width: 100%; border-collapse: collapse; text-align: left;">
                <thead>
                    <tr style="background: rgba(255, 255, 255, 0.05);">
                        <th style="padding: 1.25rem 1.5rem; color: var(--text-dim); font-weight: 600; font-size: 0.875rem;">FOTO</th>
                        <th style="padding: 1.25rem 1.5rem; color: var(--text-dim); font-weight: 600; font-size: 0.875rem;">NOME</th>
                        <th style="padding: 1.25rem 1.5rem; color: var(--text-dim); font-weight: 600; font-size: 0.875rem;">EMAIL</th>
                        <th style="padding: 1.25rem 1.5rem; color: var(--text-dim); font-weight: 600; font-size: 0.875rem;">AÇÕES</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${usuarios}" style="border-top: 1px solid var(--border);">
                        <td style="padding: 1rem 1.5rem;">
                            <img th:if="${user.foto}" th:src="${user.foto}" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">
                            <div th:unless="${user.foto}" style="width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 0.75rem;">S/F</div>
                        </td>
                        <td style="padding: 1rem 1.5rem; font-weight: 600;" th:text="${user.nome}"></td>
                        <td style="padding: 1rem 1.5rem; color: var(--text-dim);" th:text="${user.email}"></td>
                        <td style="padding: 1rem 1.5rem;">
                            <div style="display: flex; gap: 0.5rem;">
                                <!-- Botão para abrir modal de foto -->
                                <button class="btn btn-primary" style="padding: 0.4rem 0.8rem; font-size: 0.75rem;" 
                                        th:onclick="'document.getElementById(\'modal-' + ${user.id} + '\').style.display=\'flex\''">
                                    Mudar Foto
                                </button>
                            </div>

                            <!-- Modal Simples de Foto -->
                            <div th:id="'modal-' + ${user.id}" style="display:none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
                                <div class="glass-card" style="max-width: 400px; width: 90%;">
                                    <h3 style="margin-bottom: 1.5rem;">Atualizar Foto</h3>
                                    <form th:action="@{/usuarios/update-photo}" method="post" enctype="multipart/form-data">
                                        <input type="hidden" name="id" th:value="${user.id}">
                                        <div class="input-group">
                                            <input type="file" name="foto" required style="border: none; background: transparent;">
                                        </div>
                                        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                                            <button type="submit" class="btn btn-primary" style="flex: 1;">Upload</button>
                                            <button type="button" class="btn" style="flex: 1; background: rgba(255,255,255,0.1);" 
                                                    th:onclick="'document.getElementById(\'modal-' + ${user.id} + '\').style.display=\'none\''">
                                                Cancelar
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
